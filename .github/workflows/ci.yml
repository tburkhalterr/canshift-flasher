name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Forbid build artifacts
        run: |
          if git ls-files | grep -E '(\.tsbuildinfo|^dist/)'; then
            echo "::error::Build artifacts must not be tracked"
            exit 1
          fi

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run build
