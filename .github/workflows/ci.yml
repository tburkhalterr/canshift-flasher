name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger from the Actions tab — escape hatch when the auto-triggers
  # don't fire (we hit a case where CI silently skipped a PR + its main-merge,
  # see issue #79). Lets the maintainer force a green/red signal on demand.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Forbid build artifacts
        run: |
          if git ls-files | grep -E '(\.tsbuildinfo|^dist/)'; then
            echo "::error::Build artifacts must not be tracked"
            exit 1
          fi

      - name: Audit dependencies
        run: npm audit --omit=dev --audit-level=high

      # `verify-profiles` re-runs `build-profiles.mjs` and diffs against
      # committed output to catch "XML changed but JSON not regenerated" drift.
      # Requires checking out the sibling canshift-studio repo, which lives
      # outside this repo's GITHUB_TOKEN scope (private repo). For now this is
      # a local-only check — contributors run `npm run verify-profiles` after
      # touching XMLs in studio. See CANShift#1151 follow-up to wire this back
      # via a PAT or by making studio public.

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm run e2e:install
      - run: npm run build
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
