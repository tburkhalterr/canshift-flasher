# nginx.conf — served by the runtime stage of the flasher image.
# TLS is provided by Traefik in front; this server listens on plain HTTP 8080.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression for text-ish assets.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        image/svg+xml;

    # Security headers — applied to every response.
    # CSP assumes fonts are self-hosted (Orbitron lives under /fonts/).
    # connect-src allows:
    #   - self / canshift.tmbk.ch — flasher origin + the deprecated firmware fallback
    #   - api.github.com — release metadata fetch (src/lib/releases.ts)
    #   - github.com — original `browser_download_url` host before the 302
    #   - objects.githubusercontent.com — legacy redirect target for release assets
    #   - release-assets.githubusercontent.com — current redirect target
    #     (GitHub rotates between these; both must be allowlisted because
    #     CSP `connect-src` enforces the redirect chain, not just the final URL).
    # worker-src 'self' — lock Worker/SharedWorker to same-origin (no CDN fallback to default-src).
    # manifest-src 'self' — lock the PWA manifest (/manifest.webmanifest) to same-origin.
    # upgrade-insecure-requests — auto-promote any http:// asset references to https://.
    # If telemetry is enabled at build time via VITE_TELEMETRY_URL, append
    # that origin to `connect-src` below (the stock build below leaves it
    # off — telemetry is opt-in).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://canshift.tmbk.ch https://api.github.com https://github.com https://objects.githubusercontent.com https://release-assets.githubusercontent.com; worker-src 'self'; manifest-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests;" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "serial=(self)" always;

    # Long-cache fingerprinted/static assets.
    location ~* \.(js|css|woff2|png|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "serial=(self)" always;
        try_files $uri =404;
    }

    # The shell is HTML — never cache it, so deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://canshift.tmbk.ch https://api.github.com https://github.com https://objects.githubusercontent.com https://release-assets.githubusercontent.com; worker-src 'self'; manifest-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests;" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "serial=(self)" always;
    }

    # SPA fallback — all unknown paths resolve to the shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
